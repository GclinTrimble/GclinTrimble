name: Generate Metrics Dashboard

on:
  # refresh every 6 hours
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Main metrics card
        uses: lowlighter/metrics@latest
        with:
          # NB: METRICS_TOKEN must be a Personal Access Token (fine-grained or classic)
          # with at least: public_repo, read:user. See SETUP.md.
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics.svg
          user: GclinTrimble
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Paris
          config_order: base.header, isocalendar, languages, activity, community, repositories
          # Blueprint theme overrides
          config_padding: 0, 8 + 8%
          # Plugins
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, less, dockerfile, makefile
          plugin_languages_details: bytes-size, percentage
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_followup: yes
          plugin_followup_sections: repositories
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
