<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" role="img" aria-label="Guillaume Clin — Product Manager, Cloud &amp; Civil Construction. Blueprint header.">
  <defs>
    <!-- Grid patterns -->
    <pattern id="minorGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#4FC3F7" stroke-width="0.4" stroke-opacity="0.25"/>
    </pattern>
    <pattern id="majorGrid" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#minorGrid)"/>
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#8ECAE6" stroke-width="0.8" stroke-opacity="0.35"/>
    </pattern>
    <!-- Gradient backdrop -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1F3D"/>
      <stop offset="50%" stop-color="#0B2545"/>
      <stop offset="100%" stop-color="#08182F"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Animated stroke for sweep -->
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8ECAE6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#8ECAE6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8ECAE6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Backdrop -->
  <rect width="1200" height="340" fill="url(#bg)"/>
  <rect width="1200" height="340" fill="url(#majorGrid)"/>

  <!-- Drafting border -->
  <rect x="14" y="14" width="1172" height="312" fill="none" stroke="#F2F8FF" stroke-width="1.2" stroke-opacity="0.65"/>
  <rect x="22" y="22" width="1156" height="296" fill="none" stroke="#F2F8FF" stroke-width="0.6" stroke-opacity="0.5"/>

  <!-- Corner tick marks -->
  <g stroke="#F2F8FF" stroke-width="1" stroke-opacity="0.75">
    <line x1="22" y1="40" x2="42" y2="40"/><line x1="40" y1="22" x2="40" y2="42"/>
    <line x1="1158" y1="40" x2="1178" y2="40"/><line x1="1160" y1="22" x2="1160" y2="42"/>
    <line x1="22" y1="300" x2="42" y2="300"/><line x1="40" y1="298" x2="40" y2="318"/>
    <line x1="1158" y1="300" x2="1178" y2="300"/><line x1="1160" y1="298" x2="1160" y2="318"/>
  </g>

  <!-- Dimension line (top) -->
  <g stroke="#8ECAE6" stroke-width="0.8" fill="none" stroke-opacity="0.8">
    <line x1="60" y1="55" x2="1140" y2="55"/>
    <line x1="60" y1="49" x2="60" y2="61"/>
    <line x1="1140" y1="49" x2="1140" y2="61"/>
  </g>
  <text x="600" y="48" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="10" fill="#8ECAE6" letter-spacing="3">SCALE 1 : INFINITE  ·  REV 04  ·  SHEET 01 / 01</text>

  <!-- Isometric building silhouette (right side) -->
  <g transform="translate(880,90)" stroke="#8ECAE6" stroke-width="1.2" fill="none" stroke-opacity="0.85">
    <!-- Tower base -->
    <polygon points="60,150 130,120 200,150 130,180" stroke-opacity="0.7"/>
    <polygon points="60,150 60,90 130,60 130,120" />
    <polygon points="130,120 130,60 200,90 200,150"/>
    <!-- Mid floor -->
    <polygon points="70,100 70,60 130,30 130,70" stroke-opacity="0.6"/>
    <polygon points="130,70 130,30 190,60 190,100" stroke-opacity="0.6"/>
    <!-- Spire -->
    <line x1="130" y1="0" x2="130" y2="30" stroke-dasharray="3 3"/>
    <circle cx="130" cy="0" r="3" fill="#FFB703" stroke="#FFB703"/>
    <!-- Cross hatch lines -->
    <line x1="60" y1="120" x2="130" y2="90" stroke-opacity="0.4"/>
    <line x1="130" y1="90" x2="200" y2="120" stroke-opacity="0.4"/>
    <line x1="95" y1="135" x2="95" y2="75" stroke-opacity="0.4"/>
    <line x1="165" y1="135" x2="165" y2="75" stroke-opacity="0.4"/>
  </g>

  <!-- Topographic contour lines (left side) -->
  <g stroke="#4FC3F7" stroke-width="0.7" fill="none" stroke-opacity="0.55">
    <path d="M 60 240 Q 130 220 210 240 T 360 230"/>
    <path d="M 60 255 Q 140 232 220 252 T 380 244"/>
    <path d="M 60 270 Q 150 248 230 268 T 400 260"/>
    <path d="M 60 285 Q 160 264 240 282 T 410 276"/>
  </g>
  <!-- Survey points -->
  <g fill="#FFB703" stroke="#FFB703">
    <circle cx="120" cy="237" r="2"/>
    <circle cx="240" cy="248" r="2"/>
    <circle cx="350" cy="232" r="2"/>
    <circle cx="180" cy="265" r="2"/>
    <circle cx="300" cy="270" r="2"/>
  </g>
  <g font-family="ui-monospace, monospace" font-size="7" fill="#FFB703" fill-opacity="0.8">
    <text x="126" y="234">P-01</text>
    <text x="246" y="245">P-02</text>
    <text x="356" y="229">P-03</text>
  </g>

  <!-- North arrow -->
  <g transform="translate(1095,235)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#F2F8FF" stroke-width="0.8" stroke-opacity="0.7"/>
    <polygon points="0,-18 6,8 0,2 -6,8" fill="#F2F8FF" fill-opacity="0.9"/>
    <text x="0" y="-24" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#F2F8FF" font-weight="700">N</text>
  </g>

  <!-- Main title -->
  <g filter="url(#glow)">
    <text x="60" y="135" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="46" font-weight="800" fill="#F2F8FF" letter-spacing="6">GUILLAUME CLIN</text>
  </g>
  <text x="62" y="162" font-family="ui-monospace, monospace" font-size="13" fill="#8ECAE6" letter-spacing="4">PRODUCT MANAGER  ·  CLOUD &amp; CIVIL CONSTRUCTION</text>

  <!-- Underline -->
  <line x1="60" y1="172" x2="780" y2="172" stroke="#FFB703" stroke-width="1.4" stroke-opacity="0.85"/>
  <line x1="60" y1="172" x2="240" y2="172" stroke="url(#sweep)" stroke-width="3">
    <animate attributeName="x1" values="60;780;60" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="240;780;240" dur="6s" repeatCount="indefinite"/>
  </line>

  <!-- Annotations / callouts -->
  <g font-family="ui-monospace, monospace" font-size="11" fill="#F2F8FF" fill-opacity="0.92">
    <text x="60" y="200">▸ Federated Digital Twin · Surveying · Construction Intelligence</text>
    <text x="60" y="218" fill-opacity="0.7">▸ Turning blueprints into bytes — and bytes back into the built world</text>
  </g>

  <!-- Title block (bottom right, drafting style) -->
  <g transform="translate(870,250)">
    <rect width="290" height="60" fill="#0A1F3D" stroke="#F2F8FF" stroke-width="0.9" stroke-opacity="0.8"/>
    <line x1="0" y1="20" x2="290" y2="20" stroke="#F2F8FF" stroke-opacity="0.6"/>
    <line x1="0" y1="40" x2="290" y2="40" stroke="#F2F8FF" stroke-opacity="0.6"/>
    <line x1="170" y1="0" x2="170" y2="60" stroke="#F2F8FF" stroke-opacity="0.6"/>
    <text x="8" y="14" font-family="ui-monospace, monospace" font-size="8.5" fill="#8ECAE6" letter-spacing="1">PROJECT</text>
    <text x="8" y="34" font-family="ui-monospace, monospace" font-size="8.5" fill="#8ECAE6" letter-spacing="1">DRAWN BY</text>
    <text x="8" y="54" font-family="ui-monospace, monospace" font-size="8.5" fill="#8ECAE6" letter-spacing="1">DATE</text>
    <text x="178" y="14" font-family="ui-monospace, monospace" font-size="9" fill="#F2F8FF">DIGITAL TWIN</text>
    <text x="178" y="34" font-family="ui-monospace, monospace" font-size="9" fill="#F2F8FF">G. CLIN</text>
    <text x="178" y="54" font-family="ui-monospace, monospace" font-size="9" fill="#F2F8FF">2026 · ONGOING</text>
  </g>

  <!-- Status LED -->
  <g transform="translate(1140,40)">
    <circle cx="0" cy="0" r="4" fill="#39FF14">
      <animate attributeName="opacity" values="1;0.25;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="-12" y="3" text-anchor="end" font-family="ui-monospace, monospace" font-size="9" fill="#39FF14" letter-spacing="2">ONLINE</text>
  </g>
</svg>
